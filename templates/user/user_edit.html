{% extends "layouts/base.html" %}

{% block title %}Chỉnh sửa người dùng{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 600px;">
    <h2 class="mb-4">Chỉnh sửa thông tin người dùng</h2>

    <!-- Hiển thị flash message -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-warning alert-dismissible fade show" role="alert">
                    {{ msg }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('edit_user', id=user.id) }}">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username" value="{{ user.username }}" required>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
        </div>

     <div class="mb-3">
            <label for="role" class="form-label">Role</label>
            <select class="form-select" id="role" name="role">
                {% set admin_count = users | selectattr('role','equalto','admin') | list | length %}

                {% if user.role == 'admin' %}
                    <!-- Nếu đang sửa là admin thì chỉ show admin -->
                    <option value="admin" selected>Admin</option>
                {% else %}
                    <!-- Nếu không phải admin -->
                    <option value="patient" {% if user.role == 'patient' %}selected{% endif %}>Patient</option>
                    <option value="doctor" {% if user.role == 'doctor' %}selected{% endif %}>Doctor</option>
                {% endif %}
            </select>
        </div>


        <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
            <a href="{{ url_for('users') }}" class="btn btn-secondary">Hủy</a>
        </div>
    </form>
</div>
{% endblock %}
